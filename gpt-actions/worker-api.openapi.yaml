openapi: 3.1.0
info:
  title: CryptoOps Worker API
  version: 2.0.1
  description: >-
    Paper-only crypto-signal-bot Worker API. Live trading and withdrawals are
    permanently blocked by policy and must return HTTP 403.
servers:
  - url: https://crypto-signal-bot-api.gr8r9bfzry.workers.dev
    description: Current Cloudflare Worker backend
paths:
  /healthz:
    get:
      operationId: getHealthz
      summary: Check Worker health
      responses:
        "200":
          description: Worker health response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /runtime/status:
    get:
      operationId: getRuntimeStatus
      summary: Verify runtime paper-safety configuration
      responses:
        "200":
          description: Runtime status and paper-safety values
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeStatusResponse"
  /guardian/status:
    get:
      operationId: getGuardianStatus
      summary: Get guardian and circuit-breaker status
      responses:
        "200":
          description: Guardian status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GuardianStatusResponse"
  /surge/status:
    get:
      operationId: getSurgeStatus
      summary: Get surge-monitoring status
      responses:
        "200":
          description: Surge status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SurgeStatusResponse"
  /portfolio/summary:
    get:
      operationId: getPortfolioSummary
      summary: Get paper portfolio summary
      responses:
        "200":
          description: Paper portfolio summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioSummaryResponse"
  /market/feed/status:
    get:
      operationId: getMarketFeedStatus
      summary: Check public market data feed status
      responses:
        "200":
          description: Market feed status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketFeedStatusResponse"
  /exchange/circuit-breakers:
    get:
      operationId: getExchangeCircuitBreakers
      summary: Get exchange circuit-breaker configuration and state
      responses:
        "200":
          description: Exchange circuit-breaker state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CircuitBreakersResponse"
  /market/price/{symbol}:
    get:
      operationId: getMarketPrice
      summary: Get public market price for a symbol
      parameters:
        - name: symbol
          in: path
          required: true
          description: Market symbol, for example BTC, ETH, or BTC-USD.
          schema:
            type: string
      responses:
        "200":
          description: Market price response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketPriceResponse"
        "404":
          description: Symbol not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /signals:
    get:
      operationId: getSignals
      summary: Get current paper-mode signals
      responses:
        "200":
          description: Signal list or signal status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignalsResponse"
  /intent/paper:
    post:
      operationId: postPaperIntent
      summary: Submit a paper-only trade intent
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaperIntentRequest"
      responses:
        "200":
          description: Paper trade intent accepted or simulated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaperIntentResponse"
        "400":
          description: Invalid paper intent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /intent/live:
    post:
      operationId: postLiveIntentBlocked
      summary: Live trade intent is permanently blocked
      description: This endpoint must always return HTTP 403 in this paper-only project.
      responses:
        "403":
          description: Live trading is blocked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlockedResponse"
  /withdraw:
    post:
      operationId: postWithdrawBlocked
      summary: Withdrawals are permanently blocked
      description: This endpoint must always return HTTP 403 in this paper-only project.
      responses:
        "403":
          description: Withdrawals are blocked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlockedResponse"
  /backtest:
    post:
      operationId: postBacktest
      summary: Run a paper-mode strategy backtest
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BacktestRequest"
      responses:
        "200":
          description: Backtest response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestResponse"
components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          description: Worker health status.
        mode:
          type: string
          description: Runtime mode.
        timestamp:
          type: string
          description: Response timestamp.
      additionalProperties: true
    RuntimeStatusResponse:
      type: object
      properties:
        trading_mode:
          type: string
          description: Expected value is paper.
        exchange_mode:
          type: string
          description: Expected value is paper.
        allow_mainnet:
          type: boolean
          description: Expected value is false.
        market_data_public_exchange:
          type: string
          description: Public read-only market data exchange.
      additionalProperties: true
    GuardianStatusResponse:
      type: object
      properties:
        status:
          type: string
          description: Guardian status.
        enabled:
          type: boolean
          description: Whether guardian checks are active.
        max_drawdown_pct:
          type: number
          description: Maximum paper drawdown threshold.
      additionalProperties: true
    SurgeStatusResponse:
      type: object
      properties:
        status:
          type: string
          description: Surge monitor status.
        active:
          type: boolean
          description: Whether surge mode is active.
      additionalProperties: true
    PortfolioSummaryResponse:
      type: object
      properties:
        mode:
          type: string
          description: Expected value is paper.
        balance_usdt:
          type: number
          description: Paper USDT balance.
        equity_usdt:
          type: number
          description: Paper portfolio equity.
        positions:
          type: array
          items:
            type: object
            properties:
              symbol:
                type: string
              quantity:
                type: number
              value_usdt:
                type: number
            additionalProperties: true
      additionalProperties: true
    MarketFeedStatusResponse:
      type: object
      properties:
        status:
          type: string
          description: Feed status.
        exchange:
          type: string
          description: Public read-only exchange source.
        mode:
          type: string
          description: Expected value is public_data_only.
      additionalProperties: true
    CircuitBreakersResponse:
      type: object
      properties:
        status:
          type: string
          description: Circuit-breaker status.
        breakers:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              triggered:
                type: boolean
              reason:
                type: string
            additionalProperties: true
      additionalProperties: true
    MarketPriceResponse:
      type: object
      properties:
        symbol:
          type: string
          description: Market symbol.
        price:
          type: number
          description: Current public market price.
        currency:
          type: string
          description: Quote currency.
        source:
          type: string
          description: Public data source.
        timestamp:
          type: string
          description: Price timestamp.
      additionalProperties: true
    SignalsResponse:
      type: object
      properties:
        mode:
          type: string
          description: Expected value is paper.
        signals:
          type: array
          items:
            type: object
            properties:
              symbol:
                type: string
              action:
                type: string
              confidence:
                type: number
              reason:
                type: string
            additionalProperties: true
      additionalProperties: true
    PaperIntentRequest:
      type: object
      properties:
        symbol:
          type: string
          description: Symbol to simulate, for example BTC-USD.
        side:
          type: string
          enum:
            - buy
            - sell
        quantity:
          type: number
          description: Optional paper quantity.
        notional_usdt:
          type: number
          description: Optional paper notional value in USDT.
      additionalProperties: true
    PaperIntentResponse:
      type: object
      properties:
        status:
          type: string
          description: Paper intent status.
        mode:
          type: string
          description: Expected value is paper.
        order_id:
          type: string
          description: Simulated paper order id.
        message:
          type: string
          description: Result message.
      additionalProperties: true
    BacktestRequest:
      type: object
      properties:
        symbol:
          type: string
          description: Symbol to backtest.
        strategy:
          type: string
          description: Strategy identifier.
        start:
          type: string
          description: Start date or timestamp.
        end:
          type: string
          description: End date or timestamp.
      additionalProperties: true
    BacktestResponse:
      type: object
      properties:
        status:
          type: string
          description: Backtest status.
        mode:
          type: string
          description: Expected value is paper.
        result:
          type: object
          properties:
            pnl_usdt:
              type: number
            win_rate:
              type: number
            trades:
              type: integer
          additionalProperties: true
      additionalProperties: true
    BlockedResponse:
      type: object
      properties:
        error:
          type: string
          description: Blocked action error.
        status:
          type: string
          description: Blocked status.
        message:
          type: string
          description: Safety policy message.
      additionalProperties: true
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Error code or type.
        message:
          type: string
          description: Human-readable error message.
      additionalProperties: true
security: []
