openapi: 3.1.0
info:
  title: crypto-signal-bot Worker API Action
  version: 2.2.0
  description: Worker/API action schema. System operates in paper mode by default and graduates to live mode only after verified performance criteria are met and the owner explicitly approves. Coinbase is public read-only market data only.
servers:
  - url: https://crypto-signal-bot-api.gr8r9bfzry.workers.dev
    description: Current Cloudflare Worker backend
components:
  schemas:
    GenericObject:
      type: object
      additionalProperties: true
    ErrorObject:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        code:
          type: integer
        mode:
          type: string
      additionalProperties: true
    RuntimeStatus:
      type: object
      properties:
        trading_mode:
          type: string
        exchange_mode:
          type: string
        allow_mainnet:
          type: boolean
        live_trading_enabled:
          type: boolean
        withdrawals_enabled:
          type: boolean
        network:
          type: string
      additionalProperties: true
    GuardianResetRequest:
      type: object
      required:
        - reason
      properties:
        reason:
          type: string
          minLength: 1
      additionalProperties: false
    SignalGenerateRequest:
      type: object
      properties:
        symbol:
          type: string
        strategy:
          type: string
          description: Optional signal strategy. Supported values include ema_crossover, rsi_mean_revert, macd_momentum, and combined.
      additionalProperties: false
    PortfolioResetRequest:
      type: object
      required:
        - confirm
      properties:
        confirm:
          type: boolean
          description: Must be true to confirm the reset.
        reason:
          type: string
        starting_cash:
          type: number
          default: 10000
      additionalProperties: false
    D1ReadonlyRequest:
      type: object
      required:
        - sql
      properties:
        sql:
          type: string
          description: Must be a SELECT query. Non-SELECT SQL is rejected server-side by the Worker.
        params:
          type: array
          items:
            oneOf:
              - type: string
              - type: number
              - type: boolean
              - type: 'null'
      additionalProperties: false
paths:
  /healthz:
    get:
      operationId: getHealthz
      summary: Check Worker liveness
      responses:
        "200":
          description: Health check
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObject"
  /runtime/status:
    get:
      operationId: getRuntimeStatus
      summary: Verify paper runtime status
      responses:
        "200":
          description: Runtime status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeStatus"
  /guardian/status:
    get:
      operationId: getGuardianStatus
      summary: Get guardian status
      responses:
        "200":
          description: Guardian status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObject"
  /guardian/reset:
    post:
      operationId: postGuardianReset
      summary: Reset paper guardian kill switch with a required reason
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GuardianResetRequest"
      responses:
        "200":
          description: Guardian reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObject"
  /signals/generate:
    post:
      operationId: postSignalsGenerate
      summary: Generate and store a paper-mode signal with an optional strategy parameter
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignalGenerateRequest"
      responses:
        "200":
          description: Generated signal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObject"
  /api/v1/portfolio/reset:
    post:
      operationId: postPortfolioReset
      summary: Reset paper portfolio through the backend service-layer v1 route
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PortfolioResetRequest"
      responses:
        "200":
          description: Portfolio reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObject"
        "400":
          description: Reset confirmation missing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorObject"
        "403":
          description: Reset blocked outside paper mode
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorObject"
  /stream/latest:
    get:
      operationId: getStreamLatest
      summary: Get the latest streaming event snapshot as a polling fallback to WebSocket /stream
      responses:
        "200":
          description: Latest stream event or safe no-event default
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObject"
  /d1/query/readonly:
    post:
      operationId: queryD1Readonly
      summary: Run a server-enforced readonly D1 SELECT query
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/D1ReadonlyRequest"
      responses:
        "200":
          description: Readonly D1 query result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObject"
        "400":
          description: Rejected non-SELECT SQL or invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorObject"
  /intent/live:
    post:
      operationId: verifyLiveTradingBlocked
      summary: Verify live trading is blocked
      responses:
        "403":
          description: Live trading blocked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorObject"
  /withdraw:
    post:
      operationId: verifyWithdrawBlocked
      summary: Verify withdrawals are blocked
      responses:
        "403":
          description: Withdrawals blocked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorObject"
  /agent/memory/{key}:
    get:
      operationId: getAgentMemory
      summary: Read a value from persistent agent memory (Cloudflare KV)
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Memory value
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObject"
    post:
      operationId: setAgentMemory
      summary: Write a value to persistent agent memory (30-day TTL)
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - value
              properties:
                value:
                  description: Any JSON-serializable value to store
      responses:
        "200":
          description: Value stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObject"
    delete:
      operationId: deleteAgentMemory
      summary: Delete a key from persistent agent memory
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Key deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObject"
  /agent/context:
    get:
      operationId: getAgentContext
      summary: >
        Get a full system snapshot in one call — runtime mode, guardian status,
        latest signal, portfolio summary, and memory availability.
        Call this at the start of every session to orient yourself.
      responses:
        "200":
          description: Agent context snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObject"
security: []
