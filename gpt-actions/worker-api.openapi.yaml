openapi: 3.1.0
info:
  title: crypto-signal-bot Worker API Action
  version: 2.1.0
  description: Paper-only Worker API. Live trading and withdrawals must remain blocked with HTTP 403. Coinbase is public read-only market data only.
servers:
  - url: https://crypto-signal-bot-api.gr8r9bfzry.workers.dev
    description: Current Cloudflare Worker backend
components:
  schemas:
    GenericObject:
      type: object
      properties:
        status:
          type: string
        mode:
          type: string
        ts:
          type: number
      additionalProperties: true
    ErrorObject:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        code:
          type: integer
        mode:
          type: string
      additionalProperties: true
    RuntimeStatus:
      type: object
      properties:
        trading_mode:
          type: string
        exchange_mode:
          type: string
        allow_mainnet:
          type: boolean
        market_data_source:
          type: string
        starting_balance:
          type: number
        guardian_max_drawdown:
          type: number
        network:
          type: string
        runtime:
          type: string
        region:
          type: string
      additionalProperties: true
    GuardianStatus:
      type: object
      properties:
        triggered:
          type: boolean
        reason:
          type: string
        error_count:
          type: number
        drawdown_pct:
          type: number
        max_drawdown_pct:
          type: number
        mode:
          type: string
        allow_mainnet:
          type: boolean
        live_trading_enabled:
          type: boolean
        withdrawals_enabled:
          type: boolean
      additionalProperties: true
    PortfolioSummary:
      type: object
      properties:
        balance_usdt:
          type: number
        cash_usdt:
          type: number
        equity_usdt:
          type: number
        realized_pnl:
          type: number
        unrealized_pnl:
          type: number
        total_pnl:
          type: number
        open_positions:
          type: array
          items:
            type: object
            additionalProperties: true
        positions:
          type: array
          items:
            type: object
            additionalProperties: true
        position_count:
          type: integer
        mode:
          type: string
      additionalProperties: true
    MarketPrice:
      type: object
      properties:
        symbol:
          type: string
        price:
          type: number
        source:
          type: string
        stale:
          type: boolean
        ts:
          type: number
      additionalProperties: true
    PaperIntentRequest:
      type: object
      required:
        - symbol
        - side
      properties:
        symbol:
          type: string
        side:
          type: string
          enum:
            - buy
            - sell
        quantity:
          type: number
          exclusiveMinimum: 0
        qty:
          type: number
          exclusiveMinimum: 0
        notional_usdt:
          type: number
          exclusiveMinimum: 0
        amount:
          type: number
          exclusiveMinimum: 0
        price:
          type: number
          exclusiveMinimum: 0
      additionalProperties: false
    SignalGenerateRequest:
      type: object
      properties:
        symbol:
          type: string
      additionalProperties: false
    SignalResponse:
      type: object
      properties:
        symbol:
          type: string
        timeframe:
          type: string
        side:
          type: string
        action:
          type: string
        confidence:
          type: number
        entry_price:
          type: number
        stop_loss:
          type: number
        take_profit:
          type: number
        strategy:
          type: string
        indicators:
          type: object
          additionalProperties: true
        mode:
          type: string
      additionalProperties: true
    BacktestRequest:
      type: object
      required:
        - symbol
      properties:
        symbol:
          type: string
        timeframe:
          type: string
        lookback:
          type: integer
          minimum: 1
        strategy:
          type: string
      additionalProperties: true
    BacktestResponse:
      type: object
      properties:
        status:
          type: string
        symbol:
          type: string
        strategy:
          type: string
        trades:
          type: integer
        trade_log:
          type: array
          items:
            type: object
            additionalProperties: true
        win_rate:
          type: number
        pnl_usdt:
          type: number
        no_trade_reason:
          type: string
        mode:
          type: string
      additionalProperties: true
paths:
  /healthz:
    get:
      operationId: getHealthz
      summary: Check Worker liveness
      responses:
        "200":
          description: Health check
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObject"
  /health:
    get:
      operationId: getHealth
      summary: Check Worker health
      responses:
        "200":
          description: Health check
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObject"
  /runtime/status:
    get:
      operationId: getRuntimeStatus
      summary: Verify paper runtime status
      responses:
        "200":
          description: Runtime status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeStatus"
  /guardian/status:
    get:
      operationId: getGuardianStatus
      summary: Get guardian status
      responses:
        "200":
          description: Guardian status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GuardianStatus"
  /portfolio/summary:
    get:
      operationId: getPortfolioSummary
      summary: Get paper portfolio summary
      responses:
        "200":
          description: Portfolio summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioSummary"
  /portfolio/trades:
    get:
      operationId: getPortfolioTrades
      summary: Get paper portfolio trades
      responses:
        "200":
          description: Portfolio trades
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
  /market/price/{symbol}:
    get:
      operationId: getMarketPrice
      summary: Get public Coinbase market price for a symbol
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Market price
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketPrice"
  /market/feed/status:
    get:
      operationId: getMarketFeedStatus
      summary: Get public market feed status
      responses:
        "200":
          description: Market feed status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObject"
  /signals:
    get:
      operationId: getSignals
      summary: Get latest signal
      parameters:
        - name: symbol
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Signals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignalResponse"
  /signals/history:
    get:
      operationId: getSignalsHistory
      summary: Get signal history
      parameters:
        - name: symbol
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Signal history
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
  /signals/generate:
    post:
      operationId: postSignalsGenerate
      summary: Generate and store a paper-mode signal using EMA(9), EMA(21), and RSI(14)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignalGenerateRequest"
      responses:
        "200":
          description: Generated signal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignalResponse"
  /dashboard:
    get:
      operationId: getDashboard
      summary: Get stable dashboard/report aggregation from live Worker API data
      responses:
        "200":
          description: Dashboard aggregation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObject"
  /surge/status:
    get:
      operationId: getSurgeStatus
      summary: Get surge scanner status
      responses:
        "200":
          description: Surge status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObject"
  /exchange/circuit-breakers:
    get:
      operationId: getExchangeCircuitBreakers
      summary: Get exchange circuit breaker status
      responses:
        "200":
          description: Exchange circuit breakers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObject"
  /audit:
    get:
      operationId: getAudit
      summary: Get audit trail
      responses:
        "200":
          description: Audit trail
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
  /intent/paper:
    post:
      operationId: postPaperIntent
      summary: Submit a paper-only simulated trade intent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaperIntentRequest"
      responses:
        "200":
          description: Paper intent accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObject"
        "400":
          description: Invalid paper intent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorObject"
        "403":
          description: Guardian blocked paper intent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorObject"
  /backtest:
    get:
      operationId: getBacktestStatus
      summary: Get backtest engine status
      responses:
        "200":
          description: Backtest status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObject"
    post:
      operationId: postBacktest
      summary: Run paper-mode backtest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BacktestRequest"
      responses:
        "200":
          description: Backtest result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestResponse"
  /guardian/kill:
    post:
      operationId: postGuardianKill
      summary: Activate paper guardian kill switch
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
              additionalProperties: false
      responses:
        "200":
          description: Guardian kill switch activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObject"
  /guardian/reset:
    post:
      operationId: postGuardianReset
      summary: Reset paper guardian kill switch
      responses:
        "200":
          description: Guardian reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObject"
  /intent/live:
    post:
      operationId: verifyLiveTradingBlocked
      summary: Verify live trading is blocked
      responses:
        "403":
          description: Live trading blocked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorObject"
  /withdraw:
    post:
      operationId: verifyWithdrawBlocked
      summary: Verify withdrawals are blocked
      responses:
        "403":
          description: Withdrawals blocked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorObject"
security: []
