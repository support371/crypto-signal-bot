openapi: 3.1.0
info:
  title: Render Action
  version: 1.0.0
servers:
  - url: https://api.render.com/v1
components:
  securitySchemes:
    RenderBearer:
      type: http
      scheme: bearer
security:
  - RenderBearer: []
paths:
  /services:
    get:
      operationId: listRenderServices
      summary: List Render services
      responses:
        "200":
          description: OK
  /services/{serviceId}/deploys:
    get:
      operationId: listRenderDeploys
      summary: List recent service deploys
      parameters:
        - name: serviceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
