version: 2.1

jobs:
  build:
    docker:
      - image: cimg/node:22.12.0
    steps:
      - checkout
      - run:
          name: "Print Runtime Versions"
          command: |
            node -v
            npm -v
            if command -v python3 >/dev/null 2>&1; then python3 --version; else echo "python3 not installed yet"; fi
      - run:
          name: "Install Frontend Dependencies"
          command: |
            npm ci
      - run:
          name: "Build Frontend"
          command: |
            VITE_BACKEND_URL=/api VITE_API_BASE_URL=/api npm run build
      - run:
          name: "Install Python Tooling"
          command: |
            if ! command -v python3 >/dev/null 2>&1 || ! python3 -m pip --version >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y python3 python3-pip python3-venv
            fi
            python3 -m pip install --upgrade pip
      - run:
          name: "Install Backend Dependencies"
          command: |
            python3 -m pip install -r backend/requirements.txt
      - run:
          name: "Run Backend Tests"
          command: |
            python3 -m pytest backend/tests tests/test_provider_registry.py tests/test_integrations_endpoint.py tests/test_waitlist_endpoint.py -q
      - run:
          name: "Run Repo Audit"
          command: |
            python3 scripts/repo_audit.py
      - run:
          name: "Placeholder for Deployment"
          command: |
            echo "Deployment step would go here"

workflows:
  version: 2
  build-and-deploy:
    jobs:
      - build
