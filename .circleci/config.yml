version: 2.1

jobs:
  frontend-build:
    docker:
      - image: cimg/node:22.12.0
    steps:
      - checkout
      - run:
          name: Print frontend runtime versions
          command: |
            node -v
            npm -v
      - run:
          name: Install frontend dependencies
          command: npm ci
      - run:
          name: Lint frontend
          command: npm run lint
      - run:
          name: Build frontend
          environment:
            VITE_BACKEND_URL: /api
            VITE_API_BASE_URL: /api
          command: npm run build

  backend-test-audit:
    docker:
      - image: cimg/python:3.11
    steps:
      - checkout
      - run:
          name: Print backend runtime versions
          command: |
            python --version
            python -m pip --version
      - run:
          name: Install backend dependencies
          command: |
            python -m pip install --upgrade pip
            python -m pip install -r backend/requirements.txt
      - run:
          name: Verify backend import surface
          command: python -m py_compile backend/app.py
      - run:
          name: Run stabilization test contract
          command: |
            python -m pytest \
              backend/tests/test_event_log_store.py \
              backend/tests/test_audit_store_event_log.py \
              backend/tests/test_event_log_router.py \
              tests/test_provider_registry.py \
              tests/test_integrations_endpoint.py \
              tests/test_waitlist_endpoint.py \
              -q
      - run:
          name: Run structural repo audit
          command: python scripts/repo_audit.py

workflows:
  version: 2
  stabilize-production-runtime:
    jobs:
      - frontend-build
      - backend-test-audit
