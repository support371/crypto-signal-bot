version: 2.1

jobs:
  frontend-build:
    docker:
      - image: cimg/node:22.12.0
    steps:
      - checkout
      - run:
          name: Print frontend runtime versions
          command: |
            node -v
            npm -v
      - run:
          name: Install frontend dependencies
          command: npm ci
      - run:
          name: Lint frontend
          command: npm run lint
      - run:
          name: Build frontend
          environment:
            VITE_BACKEND_URL: /api
            VITE_API_BASE_URL: /api
          command: npm run build

  worker-fast-path:
    docker:
      - image: cimg/node:22.12.0
    steps:
      - checkout
      - run:
          name: Install root test dependencies
          command: npm ci
      - run:
          name: Run fast-path and v2 contract tests
          command: npm run test:worker
      - run:
          name: Install Worker dependencies
          command: npm --prefix worker ci
      - run:
          name: Type-check Cloudflare Worker
          command: npm --prefix worker run build
      - run:
          name: Verify paper-safety contract
          command: npm --prefix worker run verify:paper-safety

  backend-test-audit:
    docker:
      - image: cimg/python:3.11
    steps:
      - checkout
      - run:
          name: Install backend dependencies
          command: |
            python -m pip install --upgrade pip
            python -m pip install -r backend/requirements.txt
      - run:
          name: Verify backend import surface
          command: |
            python -m py_compile              backend/app.py              backend/public_app.py              backend/render_entrypoint.py              backend/logic/live_execution_guard.py              backend/services/execution_idempotency.py              backend/services/order_reconciliation.py              backend/db/models/execution_request.py              backend/db/migrations/0003_execution_requests.py
      - run:
          name: Lint backend
          command: python -m ruff check backend/ --select E,W,F --ignore E402,F401,E501,E741 --exit-zero
      - run:
          name: Run execution safety tests
          command: |
            python -m pytest \
              backend/tests/test_live_execution_guard.py \
              backend/tests/test_execution_idempotency.py \
              backend/tests/test_order_reconciliation.py \
              -q
      - run:
          name: Run full backend test suite
          command: python -m pytest backend/tests/ -x -q
      - run:
          name: Run stabilization test contract
          command: |
            python -m pytest \
              backend/tests/test_event_log_store.py \
              backend/tests/test_audit_store_event_log.py \
              backend/tests/test_event_log_router.py \
              tests/test_provider_registry.py \
              tests/test_integrations_endpoint.py \
              tests/test_waitlist_endpoint.py \
              -q
      - run:
          name: Run structural repo audit
          command: python scripts/repo_audit.py

workflows:
  version: 2
  stabilize-production-runtime:
    jobs:
      - frontend-build
      - worker-fast-path
      - backend-test-audit
