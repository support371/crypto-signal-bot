# Backend configuration for Crypto Signal Bot
# Risk limits, kill-switch thresholds, and exchange settings.

risk:
  max_position_pct: 0.05       # Max 5% of portfolio in a single position
  max_daily_loss_pct: 0.03     # Max 3% daily loss before halt
  volatility_threshold: 0.08   # Spread > 8% triggers CHAOS regime
  max_leverage: 1.0            # No leverage (spot only)
  max_slippage_pct: 0.005      # 0.5% max slippage tolerance
  risk_score_reject_threshold: 70.0

kill_switch:
  max_api_errors: 10           # Halt after 10 consecutive API errors
  max_failed_orders: 5         # Halt after 5 consecutive failed orders
  max_daily_loss_pct: 0.05     # Halt after 5% daily loss

exchange:
  # Primary exchange (auto-detected from env vars)
  # Set BITGET_API_KEY + BITGET_SECRET + BITGET_PASSPHRASE for Bitget
  # Set BTCC_API_KEY + BTCC_SECRET for BTCC
  bitget:
    base_url: https://api.bitget.com
    timeout: 10
  btcc:
    base_url: https://api.btcc.com
    timeout: 10
  bitget:
    base_url_testnet: https://api.bitget.com
    base_url_mainnet: https://api.bitget.com
    demo_trading_header: paptrading
    timeout: 10
  btcc:
    base_url_testnet: https://api.btcc.com
    base_url_mainnet: https://api.btcc.com
    timeout: 10

paper:
  starting_balance_usdt: 10000.0
  slippage_range_pct: [0.01, 0.05]
  use_live_market_data: false

market_data:
  public_exchange: binance
  mode: synthetic_paper
  rest_fallback_enabled: true

withdrawal:
  daily_limit_usdt: 10000.0
  cooldown_seconds: 60
  # Add whitelisted withdrawal addresses here
  whitelisted_addresses: []

server:
  host: 0.0.0.0
  port: 8000
  cors_origins:
    - http://localhost:5173
    - http://localhost:8080
    - http://localhost:3000
    - https://crypto-signal-bot-indol.vercel.app
