# Backend configuration — LIVE TEST MODE ($100)
# Tight risk limits for controlled first live run.

risk:
  max_position_pct: 0.05         # 5% per trade = $5 per position
  max_daily_loss_pct: 0.05       # Stop after 5% daily loss ($5)
  volatility_threshold: 0.08
  max_leverage: 1.0              # Spot only — no leverage
  max_slippage_pct: 0.005
  risk_score_reject_threshold: 70.0

kill_switch:
  max_api_errors: 5
  max_failed_orders: 3
  max_daily_loss_pct: 0.05       # 5% daily = $5 on $100
  max_drawdown_pct: 10.0         # Hard stop at 10% = $10 loss

exchange:
  bitget:
    base_url_testnet: https://api.bitget.com
    base_url_mainnet: https://api.bitget.com
    timeout: 10

paper:
  starting_balance_usdt: 10000.0
  slippage_range_pct: [0.01, 0.05]
  use_live_market_data: true

market_data:
  public_exchange: coingecko
  mode: live
  rest_fallback_enabled: true

withdrawal:
  daily_limit_usdt: 0.0          # Withdrawals disabled for bot key
  cooldown_seconds: 60
  whitelisted_addresses: []

server:
  host: 0.0.0.0
  port: 8000
  cors_origins:
    - http://localhost:5173
    - http://localhost:8080
    - http://localhost:3000
    - https://crypto-signal-bot-indol.vercel.app
    - https://crypto-signal-bot-admin-25521151s-projects.vercel.app
    - https://crypto-signal-bot-deqd.onrender.com
    - https://app.base44.com
