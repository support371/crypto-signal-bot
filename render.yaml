services:
  - type: web
    name: crypto-signal-bot-backend
    runtime: python
    plan: free
    rootDir: .
    buildCommand: python -m pip install --upgrade pip && python -m pip install -r backend/requirements.txt
    startCommand: python render_start.py
    healthCheckPath: /healthz
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9

      # ── Trading mode ─────────────────────────────────────────────
      # PAPER MODE (default — safe)
      - key: TRADING_MODE
        value: paper
      - key: NETWORK
        value: testnet
      - key: ALLOW_MAINNET
        value: "false"

      # Switch to LIVE: set TRADING_MODE=live, NETWORK=mainnet, ALLOW_MAINNET=true
      # + add exchange credentials below

      # ── Exchange ──────────────────────────────────────────────────
      - key: EXCHANGE
        value: bitget
      - key: PAPER_USE_LIVE_MARKET_DATA
        value: "true"
      - key: MARKET_DATA_PUBLIC_EXCHANGE
        value: coingecko

      # ── Bitget credentials (set in Render dashboard, not here) ───
      # - key: BITGET_API_KEY
      #   sync: false
      # - key: BITGET_API_SECRET
      #   sync: false
      # - key: BITGET_API_PASSPHRASE
      #   sync: false

      # ── BTCC credentials (alternative) ───────────────────────────
      # - key: BTCC_API_KEY
      #   sync: false
      # - key: BTCC_API_SECRET
      #   sync: false

      # ── Telegram alerts ───────────────────────────────────────────
      - key: TELEGRAM_ALERTS_ENABLED
        value: "true"
      - key: TELEGRAM_CHANNEL_ID
        value: "-1003368597629"
      # TELEGRAM_BOT_TOKEN set in Render dashboard (secret)

      # ── Risk / Guardian ───────────────────────────────────────────
      - key: GUARDIAN_MAX_DRAWDOWN_PCT
        value: "20"
      - key: GUARDIAN_MAX_DAILY_LOSS_PCT
        value: "10"
      - key: GUARDIAN_MAX_API_ERRORS
        value: "10"
      - key: GUARDIAN_MAX_FAILED_ORDERS
        value: "5"

      # ── Executor ──────────────────────────────────────────────────
      - key: EXECUTOR_INTERVAL
        value: "60"
      - key: EXECUTOR_MIN_CONFIDENCE
        value: "0.75"
      - key: EXECUTOR_POSITION_PCT
        value: "0.05"
      - key: EXECUTOR_MAX_POSITIONS
        value: "4"

      # ── Infrastructure ────────────────────────────────────────────
      - key: CORS_ORIGINS
        value: https://crypto-signal-bot-indol.vercel.app,https://crypto-signal-bot-admin-25521151s-projects.vercel.app,http://localhost:5173,http://localhost:8080,http://localhost:3000,https://*.base44.app,https://app.base44.com,https://*.onrender.com
      - key: EVENT_LOG_ENABLED
        value: "true"
      - key: EVENT_LOG_PATH
        value: /tmp/crypto-signal-bot/event_log.db
      - key: AUDIT_STORE_PATH
        value: /tmp/crypto-signal-bot/audit.json
      - key: EARNINGS_STORE_PATH
        value: /tmp/crypto-signal-bot/earnings.json
      - key: RATE_LIMIT_RPM
        value: "120"
      - key: BACKEND_API_KEY
        sync: false
