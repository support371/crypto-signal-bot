name: Render Keepalive

on:
  schedule:
    # GitHub Actions schedules are best-effort. This is the shortest practical cadence.
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      backend_url:
        description: 'Render backend base URL to ping'
        required: false
        default: 'https://crypto-signal-bot-deqd.onrender.com'
      rounds:
        description: 'Ping rounds to run inside one workflow execution'
        required: false
        default: '3'
      sleep_seconds:
        description: 'Seconds between rounds'
        required: false
        default: '80'

permissions:
  contents: read

concurrency:
  group: render-keepalive
  cancel-in-progress: false

jobs:
  ping-render:
    name: Keep Render backend and WebSocket warm
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      DEFAULT_BACKEND_URL: https://crypto-signal-bot-deqd.onrender.com
    steps:
      - name: Resolve backend URL
        id: backend
        shell: bash
        run: |
          set -euo pipefail
          INPUT_URL="${{ github.event.inputs.backend_url || '' }}"
          BACKEND_URL="${INPUT_URL:-$DEFAULT_BACKEND_URL}"
          BACKEND_URL="${BACKEND_URL%/}"
          echo "url=$BACKEND_URL" >> "$GITHUB_OUTPUT"
          echo "Resolved Render backend: $BACKEND_URL"

      - name: Warm HTTP endpoints
        shell: bash
        run: |
          set -euo pipefail
          BACKEND_URL="${{ steps.backend.outputs.url }}"
          ROUNDS="${{ github.event.inputs.rounds || '3' }}"
          SLEEP_SECONDS="${{ github.event.inputs.sleep_seconds || '80' }}"
          REQUIRED_ENDPOINT="/health"
          OPTIONAL_ENDPOINTS=("/" "/api/health" "/ready" "/price?symbol=BTCUSDT")

          for round in $(seq 1 "$ROUNDS"); do
            echo "--- Warmup round ${round}/${ROUNDS} ---"

            required_url="${BACKEND_URL}${REQUIRED_ENDPOINT}"
            echo "Required ping: ${required_url}"
            required_code="$(curl --silent --show-error --location --max-time 25 --retry 3 --retry-delay 5 --retry-all-errors --output /tmp/render-required-response.txt --write-out '%{http_code}' "$required_url" || true)"
            echo "HTTP ${required_code} from ${REQUIRED_ENDPOINT}"
            cat /tmp/render-required-response.txt || true
            echo

            if [[ "$required_code" -lt 200 || "$required_code" -ge 300 ]]; then
              echo "Required endpoint ${REQUIRED_ENDPOINT} returned non-2xx status: ${required_code}" >&2
              exit 1
            fi

            for path in "${OPTIONAL_ENDPOINTS[@]}"; do
              url="${BACKEND_URL}${path}"
              echo "Optional warm ping: ${url}"
              code="$(curl --silent --show-error --location --max-time 20 --retry 2 --retry-delay 3 --retry-all-errors --output /tmp/render-optional-response.txt --write-out '%{http_code}' "$url" || true)"
              echo "HTTP ${code} from ${path}"
              cat /tmp/render-optional-response.txt || true
              echo
            done

            if [[ "$round" != "$ROUNDS" ]]; then
              sleep "$SLEEP_SECONDS"
            fi
          done

      - name: Check WebSocket handshake
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64
          import os
          import socket
          import ssl
          from urllib.parse import urlparse

          backend_url = "${{ steps.backend.outputs.url }}".rstrip("/")
          parsed = urlparse(backend_url)
          host = parsed.hostname
          if not host:
              raise SystemExit("Backend URL has no host")
          port = parsed.port or (443 if parsed.scheme == "https" else 80)
          ws_path = "/ws/updates"
          key = base64.b64encode(os.urandom(16)).decode("ascii")
          request = (
              f"GET {ws_path} HTTP/1.1\r\n"
              f"Host: {host}\r\n"
              "Upgrade: websocket\r\n"
              "Connection: Upgrade\r\n"
              f"Sec-WebSocket-Key: {key}\r\n"
              "Sec-WebSocket-Version: 13\r\n"
              "User-Agent: github-actions-render-keepalive\r\n"
              "\r\n"
          ).encode("ascii")

          raw_sock = socket.create_connection((host, port), timeout=20)
          try:
              sock = ssl.create_default_context().wrap_socket(raw_sock, server_hostname=host) if parsed.scheme == "https" else raw_sock
              sock.settimeout(20)
              sock.sendall(request)
              response = sock.recv(4096).decode("latin1", errors="replace")
              status_line = response.split("\r\n", 1)[0]
              print(status_line)
              if " 101 " not in status_line:
                  raise SystemExit(f"WebSocket handshake did not return 101: {status_line}")
          finally:
              try:
                  raw_sock.close()
              except Exception:
                  pass
          PY

      - name: Summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Render keepalive"
            echo ""
            echo "Backend: ${{ steps.backend.outputs.url }}"
            echo "Required endpoint: /health"
            echo "Optional warm endpoints: /, /api/health, /ready, /price?symbol=BTCUSDT"
            echo "WebSocket checked: /ws/updates handshake"
            echo "Time: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          } >> "$GITHUB_STEP_SUMMARY"
