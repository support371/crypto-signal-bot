name: Keep Render Backend Awake
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend
        run: |
          curl -sf https://crypto-signal-bot-deqd.onrender.com/ping || true
          curl -sf https://crypto-signal-bot-deqd.onrender.com/health || true
          curl -sf https://crypto-signal-bot-deqd.onrender.com/ready || true
