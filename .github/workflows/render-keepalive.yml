name: Keep Render Backend Awake (disabled)

# Disabled after migration to Cloudflare Workers.
# Active backend:
# https://crypto-signal-bot-api.gr8r9bfzry.workers.dev
#
# This workflow is intentionally manual-only. The old scheduled Render pings
# created repeated workflow noise against deprecated onrender.com endpoints.

on:
  workflow_dispatch:

jobs:
  render-migration-note:
    runs-on: ubuntu-latest
    steps:
      - name: Explain disabled Render keepalive
        run: |
          echo "Render keepalive is disabled."
          echo "Active backend is Cloudflare Workers."
          echo "Use Worker /healthz, /runtime/status, /guardian/status, and /market/feed/status for checks."
