name: release-check

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  release-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_BACKEND_URL: /api
          VITE_API_BASE_URL: /api
        run: npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Verify backend import surface
        run: python -m py_compile backend/app.py backend/public_app.py

      - name: Lint backend (ruff)
        run: python -m ruff check backend/ --select E,W,F --ignore E402,F401,E501,E741 --exit-zero

      - name: Run full backend test suite
        run: python -m pytest backend/tests/ -x -q

      - name: Run stabilization test contract
        run: python -m pytest backend/tests/test_event_log_store.py backend/tests/test_audit_store_event_log.py backend/tests/test_event_log_router.py tests/test_provider_registry.py tests/test_integrations_endpoint.py tests/test_waitlist_endpoint.py -q

      - name: Run repo audit
        run: python scripts/repo_audit.py
