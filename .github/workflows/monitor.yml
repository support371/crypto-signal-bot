name: Automated Monitor

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Run paper safety monitor checks
        id: checks
        run: |
          set -euo pipefail

          BASE="https://crypto-signal-bot-api.gr8r9bfzry.workers.dev"

          health_code=$(curl -sS --max-time 10 -o /dev/null -w "%{http_code}" "$BASE/health")
          runtime_json=$(curl -sS --max-time 10 "$BASE/runtime/status")
          guardian_json=$(curl -sS --max-time 10 "$BASE/guardian/status")
          portfolio_json=$(curl -sS --max-time 10 "$BASE/portfolio/summary")
          feed_json=$(curl -sS --max-time 10 "$BASE/market/feed/status")

          runtime_mode=$(echo "$runtime_json" | python3 -c "import sys,json; print(json.load(sys.stdin).get('mode','unknown'))")
          guardian_killed=$(echo "$guardian_json" | python3 -c "import sys,json; d=json.load(sys.stdin); print(str(d.get('killed', d.get('kill_switch_active', False))).lower())")
          drawdown=$(echo "$portfolio_json" | python3 -c "import sys,json; d=json.load(sys.stdin); print(float(d.get('drawdown_pct', d.get('drawdown', d.get('max_drawdown', 0)))))")
          feed_status=$(echo "$feed_json" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','unknown'))")

          echo "health_code=$health_code" >> "$GITHUB_OUTPUT"
          echo "runtime_mode=$runtime_mode" >> "$GITHUB_OUTPUT"
          echo "guardian_killed=$guardian_killed" >> "$GITHUB_OUTPUT"
          echo "drawdown=$drawdown" >> "$GITHUB_OUTPUT"
          echo "feed_status=$feed_status" >> "$GITHUB_OUTPUT"

          {
            echo "## Automated monitor"
            echo "- Health HTTP: $health_code"
            echo "- Runtime mode: $runtime_mode"
            echo "- Guardian killed: $guardian_killed"
            echo "- Portfolio drawdown: $drawdown%"
            echo "- Market feed: $feed_status"
          } >> "$GITHUB_STEP_SUMMARY"

          test "$health_code" = "200"
          test "$runtime_mode" = "paper"
          test "$guardian_killed" != "true"
          python3 -c "import sys; sys.exit(0 if float('$drawdown') <= 10 else 1)"
          test "$feed_status" = "live" -o "$feed_status" = "live_public"

      - name: Open issue if monitor checks failed
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          title="Automated monitor failed"
          existing=$(gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --state open \
            --label "monitor/health" \
            --search "[monitor] automated-monitor" \
            --json number --jq '.[0].number' || true)

          if [ -z "$existing" ]; then
            gh label create "monitor/health" \
              --repo "$GITHUB_REPOSITORY" \
              --color "d93f0b" \
              --description "Automated monitor alert" \
              2>/dev/null || true

            gh issue create \
              --repo "$GITHUB_REPOSITORY" \
              --title "$title" \
              --label "monitor/health" \
              --body "Automated monitor failed on $(date -u). Review the workflow summary for health, runtime, guardian, drawdown, and feed status. [monitor] automated-monitor"
          fi
