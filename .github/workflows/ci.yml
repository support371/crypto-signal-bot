name: CI
on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: python -m pip install --upgrade pip && python -m pip install -r backend/requirements.txt
      - run: python -m py_compile backend/app.py backend/public_app.py backend/render_entrypoint.py backend/logic/live_execution_guard.py backend/services/execution_idempotency.py backend/db/models/execution_request.py backend/db/migrations/0003_execution_requests.py
      - run: python -m ruff check backend/ --select E,W,F --ignore E402,F401,E501,E741 --exit-zero
      - run: python -m pytest backend/tests/ -x -q
      - run: python scripts/repo_audit.py
      - run: python -m pytest backend/tests/test_event_log_store.py backend/tests/test_audit_store_event_log.py backend/tests/test_event_log_router.py tests/test_provider_registry.py tests/test_integrations_endpoint.py tests/test_waitlist_endpoint.py -q
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_BACKEND_URL: /api
          VITE_API_BASE_URL: /api
      - run: test -f dist/index.html && test -d dist/assets
