name: CI
# NOTE: CI jobs require GitHub Actions minutes. If the account has a billing
# issue, jobs will fail immediately with "account is locked". Resolve billing
# at github.com/settings/billing to re-enable CI execution.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Verify backend imports
        run: python -m py_compile backend/app.py

      - name: Run all backend tests
        run: python -m pytest backend/tests/ -v --tb=short

      - name: Verify live-mode tests pass
        run: python -m pytest backend/tests/test_live_mode.py -v --tb=short

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        env:
          VITE_BACKEND_URL: /api
          VITE_API_BASE_URL: /api
        run: npm run build

      - name: Verify dist output
        run: |
          test -f dist/index.html
          test -d dist/assets
          echo "Frontend build output verified"
