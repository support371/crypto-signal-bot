name: CI
# Pull request validation is owned by CircleCI for this repository.
# GitHub Actions validation uses GitHub-hosted runners on feature branches so checks do not queue forever
# when the self-hosted CryptoOps runner lane is unavailable.

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Verify backend imports
        run: python -m py_compile backend/app.py backend/public_app.py

      - name: Lint backend (ruff)
        run: python -m ruff check backend/ --select E,W,F --ignore E402,F401,E501,E741 --exit-zero

      - name: Run full backend test suite
        run: python -m pytest backend/tests/ -x -q

      - name: Run repo audit
        run: python scripts/repo_audit.py

      - name: Run stabilization test contract
        run: python -m pytest backend/tests/test_event_log_store.py backend/tests/test_audit_store_event_log.py backend/tests/test_event_log_router.py tests/test_provider_registry.py tests/test_integrations_endpoint.py tests/test_waitlist_endpoint.py -q

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_BACKEND_URL: /api
          VITE_API_BASE_URL: /api
        run: npm run build

      - name: Verify dist output
        run: |
          test -f dist/index.html
          test -d dist/assets
          echo "Frontend build output verified"
