name: CI

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-agent-context:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/agent-context-route
          fetch-depth: 0

      - name: Register agent context router
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("worker/src/index.ts")
          text = path.read_text()

          import_line = "import { agentRouter } from './routes/agent'\n"
          import_anchor = "import { cors } from 'hono/cors'\n"
          route_line = "app.route('/agent', agentRouter)\n"
          route_anchor = "// ── CATCH-ALL "

          if import_line not in text:
              text = text.replace(import_anchor, import_anchor + import_line, 1)

          if route_line not in text:
              marker = text.find(route_anchor)
              if marker < 0:
                  raise SystemExit("catch-all anchor not found")
              text = text[:marker] + route_line + "\n" + text[marker:]

          path.write_text(text)
          PY

      - name: Commit route registration
        run: |
          git config user.name "CryptoOps Agent"
          git config user.email "cryptoops-agent@users.noreply.github.com"
          git add worker/src/index.ts
          git diff --cached --check
          git commit -m "feat: add /agent/context aggregation route for CryptoOps GPT agent"
          git push origin HEAD:feat/agent-context-route
