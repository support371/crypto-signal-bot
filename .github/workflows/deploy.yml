name: Deploy to Cloudflare Workers (manual)

# Manual-only release lane. Pushes to main should validate through CI/Vercel,
# but Cloudflare Worker deploys and Vercel backend URL sync must be explicitly
# requested from workflow_dispatch after paper-safety checks pass.
on:
  workflow_dispatch:
    inputs:
      deploy_worker:
        description: "Deploy the Cloudflare Worker after validation"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      update_vercel:
        description: "Sync Vercel backend URL and request a production redeploy"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: cloudflare-worker-${{ github.ref }}
  cancel-in-progress: true

env:
  WORKER_URL: https://crypto-signal-bot-api.gr8r9bfzry.workers.dev
  VERCEL_BACKEND_URL: https://crypto-signal-bot-api.gr8r9bfzry.workers.dev
  TRADING_MODE: paper
  EXCHANGE_MODE: paper
  ALLOW_MAINNET: "false"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            worker/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Lint frontend
        run: npm run lint
      - name: Build frontend
        run: npm run build
      - name: Install Worker dependencies
        run: cd worker && npm ci
      - name: Type-check Worker
        run: cd worker && npm run build
      - name: Verify paper safety
        run: cd worker && npm run verify:paper-safety
      - name: Validate Wrangler bundle
        run: npx wrangler deploy --dry-run --outdir /tmp/crypto-signal-bot-worker-dry-run --config wrangler.toml

  deploy-worker:
    needs: validate
    if: ${{ github.event.inputs.deploy_worker == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - name: Install Worker dependencies
        run: cd worker && npm ci
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          command: deploy --config ../wrangler.toml
      - name: Smoke check Worker endpoints
        run: cd worker && npm run smoke -- "$WORKER_URL"

  update-vercel:
    needs: validate
    if: ${{ github.event.inputs.update_vercel == 'true' }}
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
      VERCEL_BACKEND_URL: https://crypto-signal-bot-api.gr8r9bfzry.workers.dev
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
      - name: Update Vercel backend URL and trigger deploy
        run: node scripts/vercel-sync-backend-url.mjs
