name: Production Lock
on:
  pull_request:
    branches: [main]
  push:
    branches: [main, agent/production-lock-finalization]
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: production-lock-${{ github.ref }}
  cancel-in-progress: true
jobs:
  release-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - name: Block committed runtime secret files
        shell: bash
        run: |
          set -euo pipefail
          forbidden_files=$(find . -path ./.git -prune -o -path ./node_modules -prune -o -path ./dist -prune -o \( -name '.env' -o -name '.env.production' -o -name '.env.staging' -o -name '.env.preview' -o -name '*.pem' -o -name '*.key' -o -name '*.p12' -o -name '*.pfx' \) -type f -print)
          test -z "$forbidden_files" || { echo "$forbidden_files"; exit 1; }
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run lint --if-present
      - run: npm run build
        env:
          VITE_BACKEND_URL: /api
          VITE_API_BASE_URL: /api
      - run: test -f dist/index.html && test -d dist/assets
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: python -m pip install --upgrade pip && python -m pip install -r backend/requirements.txt
      - run: python -m py_compile backend/app.py backend/public_app.py backend/render_entrypoint.py backend/logic/live_execution_guard.py backend/services/execution_idempotency.py backend/db/models/execution_request.py backend/db/migrations/0003_execution_requests.py
      - run: python -m ruff check backend/ --select E,W,F --ignore E402,F401,E501,E741 --exit-zero
      - run: python -m pytest backend/tests/ -x -q
      - run: python scripts/repo_audit.py
      - run: python -m pytest backend/tests/test_event_log_store.py backend/tests/test_audit_store_event_log.py backend/tests/test_event_log_router.py tests/test_provider_registry.py tests/test_integrations_endpoint.py tests/test_waitlist_endpoint.py -q
      - run: test -f docs/PRODUCTION_LOCK.md
