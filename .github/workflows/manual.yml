name: Manual Read-Only Smoke Check

# Manual-only diagnostic workflow.
# This workflow never deploys, never writes data, never places trades,
# and never enables live trading or withdrawals.
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  WORKER_URL: https://crypto-signal-bot-api.gr8r9bfzry.workers.dev
  FRONTEND_URL: https://crypto-signal-bot-indol.vercel.app
  TRADING_MODE: paper
  EXCHANGE_MODE: paper
  ALLOW_MAINNET: "false"

jobs:
  smoke-check:
    runs-on: ubuntu-latest
    steps:
      - name: Confirm paper-safe environment
        run: |
          test "$TRADING_MODE" = "paper"
          test "$EXCHANGE_MODE" = "paper"
          test "$ALLOW_MAINNET" = "false"

      - name: Check Worker read-only endpoints
        run: |
          set -euo pipefail
          curl -fsS "$WORKER_URL/healthz"
          curl -fsS "$WORKER_URL/runtime/status"
          curl -fsS "$WORKER_URL/guardian/status"
          curl -fsS "$WORKER_URL/market/feed/status"
          curl -fsS "$WORKER_URL/exchange/circuit-breakers"

      - name: Verify live trading and withdrawals are blocked
        run: |
          set -euo pipefail
          live_code=$(curl -sS -o /tmp/live.json -w "%{http_code}" -X POST "$WORKER_URL/intent/live")
          withdraw_code=$(curl -sS -o /tmp/withdraw.json -w "%{http_code}" -X POST "$WORKER_URL/withdraw")
          test "$live_code" = "403"
          test "$withdraw_code" = "403"
          cat /tmp/live.json
          cat /tmp/withdraw.json

      - name: Check frontend is reachable
        run: |
          curl -fsSI "$FRONTEND_URL"
