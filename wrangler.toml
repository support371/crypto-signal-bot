name = "crypto-signal-bot-api"
main = "worker/src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
TRADING_MODE = "paper"
EXCHANGE_MODE = "paper"
NETWORK = "testnet"
ALLOW_MAINNET = "false"
MARKET_DATA_PUBLIC_EXCHANGE = "coinbase"
PAPER_STARTING_BALANCE_USDT = "10000"
GUARDIAN_MAX_DRAWDOWN_PCT = "15"
GUARDIAN_MAX_API_ERRORS = "10"
GUARDIAN_MAX_FAILED_ORDERS = "5"
RATE_LIMIT_RPM = "120"
CORS_ALLOWED_ORIGINS = "https://crypto-signal-bot-indol.vercel.app"

[[d1_databases]]
binding = "DB"
database_name = "crypto-signal-bot-db"
database_id = "REPLACE_AFTER_D1_CREATE"
migrations_dir = "worker/migrations"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "crypto-signal-bot-storage"

[[durable_objects.bindings]]
name = "GUARDIAN"
class_name = "GuardianObject"

[[durable_objects.bindings]]
name = "CIRCUIT_BREAKER"
class_name = "CircuitBreaker"

[[durable_objects.bindings]]
name = "SURGE_TRACKER"
class_name = "SurgeTracker"

[[migrations]]
tag = "v1"
new_classes = ["GuardianObject", "CircuitBreaker", "SurgeTracker"]

[triggers]
crons = [
  "*/20 * * * *",
  "*/5 * * * *",
  "0 * * * *",
  "0 0 * * *",
]
