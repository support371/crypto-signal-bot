name = "crypto-signal-bot-api"
main = "worker/src/index_agent_context.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
TRADING_MODE = "paper"
EXCHANGE_MODE = "paper"
NETWORK = "testnet"
ALLOW_MAINNET = "false"
MARKET_DATA_PUBLIC_EXCHANGE = "coinbase"
PAPER_STARTING_BALANCE_USDT = "10000"
GUARDIAN_MAX_DRAWDOWN_PCT = "15"
GUARDIAN_MAX_API_ERRORS = "10"
GUARDIAN_MAX_FAILED_ORDERS = "5"
RATE_LIMIT_RPM = "120"
CORS_ALLOWED_ORIGINS = "https://crypto-signal-bot-indol.vercel.app"

[[d1_databases]]
binding = "DB"
database_name = "crypto-signal-bot-db"
database_id = "d647c639-845a-414e-9bb4-513e42ef4451"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "crypto-signal-bot-storage"

[triggers]
crons = ["*/20 * * * *", "*/5 * * * *", "0 * * * *", "0 0 * * *"]

[[kv_namespaces]]
binding = "AGENT_MEMORY"
id = "8f0321c43b844ec08c514f1d04839a3c"
